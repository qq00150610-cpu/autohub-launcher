name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Decode Keystore
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 -d > autohub.keystore || echo "Using local keystore"
        if [ ! -f autohub.keystore ]; then
          echo "Creating debug keystore"
          keytool -genkey -v -keystore autohub.keystore -alias autohub -keyalg RSA -keysize 2048 -validity 10000 -storepass autohub123 -keypass autohub123 -dname "CN=AutoHub, OU=AutoHub, O=AutoHub, L=Beijing, ST=Beijing, C=CN"
        fi
    
    - name: Build Release APK
      run: ./gradlew assembleRelease
      env:
        KEY_ALIAS: autohub
        KEY_PASSWORD: autohub123
        STORE_PASSWORD: autohub123
    
    - name: Rename APK
      run: |
        mv app/build/outputs/apk/release/app-release.apk 凹凸桌面-v1.0-release.apk || \
        mv app/build/outputs/apk/release/app-default-release.apk 凹凸桌面-v1.0-release.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: autohub-apk
        path: 凹凸桌面-v1.0-release.apk
    
    - name: Create Release
      if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: 凹凸桌面 v1.0.${{ github.run_number }}
        files: 凹凸桌面-v1.0-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
